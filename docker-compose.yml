name: sally-ai-coach

services:
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
        - NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL}
    container_name: sally-frontend
    # 프론트엔드 자체 포트 노출은 제거하고 Caddy가 처리하도록 함
    restart: always
    env_file:
      - apps/frontend/.env
    environment:
      - NEXT_PUBLIC_BACKEND_URL=

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: sally-backend
    ports:
      - "3001:3001" # 디버깅 및 Swagger 확인을 위해 직접 접근 포트는 유지
    restart: always
    environment:
      - AI_SERVER_URL=http://ai-server:8000
    env_file:
      - apps/backend/.env

  ai-server:
    build:
      context: .
      dockerfile: apps/ai_server/Dockerfile
    container_name: sally-ai-server
    ports:
      - "8000:8000"
    restart: always
    env_file:
      - apps/ai_server/.env
    environment:
      - BACKEND_URL=http://backend:3001

  caddy:
    image: caddy:latest
    container_name: sally-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    restart: always

volumes:
  caddy_data:
  caddy_config: