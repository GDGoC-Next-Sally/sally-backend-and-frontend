<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title>Sally AI Coach - Dev Chat UI</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }

    .pane {
      flex: 1;
      padding: 20px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #ccc;
      box-sizing: border-box;
    }

    .chat-box {
      flex: 1;
      background: white;
      border: 1px solid #ccc;
      overflow-y: auto;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
    }

    .message {
      margin-bottom: 10px;
      padding: 10px 14px;
      border-radius: 8px;
      max-width: 80%;
      line-height: 1.4;
      word-wrap: break-word;
    }

    .message.student {
      background: #e3f2fd;
      align-self: flex-end;
      margin-left: auto;
      border-bottom-right-radius: 0;
    }

    .message.ai {
      background: #f1f8e9;
      align-self: flex-start;
      border-bottom-left-radius: 0;
    }

    .log-box {
      flex: 1;
      background: #222;
      color: #4af626;
      font-family: monospace;
      overflow-y: auto;
      padding: 15px;
      border-radius: 8px;
      font-size: 13px;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .input-group {
      display: flex;
      gap: 10px;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
    }

    button {
      padding: 12px 20px;
      cursor: pointer;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: bold;
    }

    button:hover {
      background: #0056b3;
    }

    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .header {
      font-weight: bold;
      margin-bottom: 15px;
      font-size: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .system-msg {
      text-align: center;
      color: #888;
      font-size: 12px;
      margin: 10px 0;
    }
  </style>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>

<body>
  <div class="pane">
    <div class="header">
      👨‍🎓 학생 시점 (채팅 & SSE)
      <div style="display: flex; gap: 10px;">
        <button id="initBtn" onclick="initData()">1. 데이터 세팅 및 토큰 발급</button>
        <button id="clearBtn" onclick="clearChat()" style="background: #dc3545; display: none;">채팅 초기화</button>
      </div>
    </div>
    <div class="chat-box" id="chatLog">
      <div class="system-msg">오른쪽 위 [데이터 세팅] 버튼을 먼저 눌러주세요.</div>
    </div>
    <div class="input-group">
      <input type="text" id="chatInput" placeholder="메시지를 입력하세요..." onkeypress="if(event.key === 'Enter') sendMessage()"
        disabled>
      <button id="sendBtn" onclick="sendMessage()" disabled>전송</button>
    </div>
  </div>
  <div class="pane">
    <div class="header">👩‍🏫 선생님 시점 (Socket.io 로그)</div>
    
    <div class="edit-session" style="margin-bottom: 15px; padding: 15px; background: white; border: 1px solid #ccc; border-radius: 8px;">
      <div style="margin-bottom: 10px; font-weight: bold; font-size: 14px; color: #333;">🛠 클래스 정보 수정 (REST API Test)</div>
      <div class="input-group">
        <input type="text" id="classSubjectInput" placeholder="과목명 (subject)" disabled>
        <button id="updateClassBtn" onclick="updateClass()" disabled>저장</button>
      </div>
    </div>

    <div class="edit-session" style="margin-bottom: 15px; padding: 15px; background: white; border: 1px solid #ccc; border-radius: 8px;">
      <div style="margin-bottom: 10px; font-weight: bold; font-size: 14px; color: #333;">🛠 세션 정보 수정 (REST API Test)</div>
      <div class="input-group" style="margin-bottom: 10px;">
        <input type="text" id="sessionNameInput" placeholder="세션 이름 (session_name)" disabled>
      </div>
      <div class="input-group">
        <input type="text" id="sessionExplanationInput" placeholder="세션 설명 (explanation)" disabled>
        <button id="updateSessionBtn" onclick="updateSession()" disabled>저장</button>
      </div>
    </div>

    <div class="log-box" id="teacherLog">대기 중...</div>
  </div>

  <script>
    let tokens = null;
    let socket = null;

    function addChat(text, type) {
      const div = document.createElement('div');
      div.className = 'message ' + type;
      div.innerText = text;
      document.getElementById('chatLog').appendChild(div);
      div.scrollIntoView();
      return div;
    }

    function addLog(event, data) {
      const text = `[${new Date().toLocaleTimeString()}] 🚀 [${event}]\n${typeof data === 'string' ? data : JSON.stringify(data, null, 2)}\n\n`;
      const logBox = document.getElementById('teacherLog');
      if (logBox.innerText === '대기 중...') logBox.innerText = '';
      logBox.innerText += text;
      logBox.scrollTop = logBox.scrollHeight;
    }

    async function initData() {
      const btn = document.getElementById('initBtn');
      btn.disabled = true;
      btn.innerText = '세팅 중...';
      addLog('system', '데이터 세팅 및 Supabase 인증 진행 중...');

      try {
        const res = await fetch('/dev/seed', { method: 'POST' });
        tokens = await res.json();

        if (!tokens.studentToken) {
          addLog('error', '초기화 실패');
          btn.innerText = '실패 (재시도)';
          btn.disabled = false;
          return;
        }

        addLog('system', '초기화 완료! 발급된 데이터:\n' + JSON.stringify({
          dialogId: tokens.dialogId,
          sessionId: tokens.sessionId,
          classId: tokens.classId
        }, null, 2));

        document.getElementById('chatLog').innerHTML = '<div class="system-msg">연결 준비 완료. 채팅을 시작하세요.</div>';
        document.getElementById('chatInput').disabled = false;
        document.getElementById('sendBtn').disabled = false;
        document.getElementById('clearBtn').style.display = 'inline-block';
        
        document.getElementById('sessionNameInput').disabled = false;
        document.getElementById('sessionExplanationInput').disabled = false;
        document.getElementById('updateSessionBtn').disabled = false;
        document.getElementById('sessionNameInput').value = 'Dev Test Session';
        
        document.getElementById('classSubjectInput').disabled = false;
        document.getElementById('updateClassBtn').disabled = false;
        document.getElementById('classSubjectInput').value = '수학';

        btn.innerText = '세팅 완료';

        connectSocket();
      } catch (err) {
        addLog('error', err.message);
        btn.innerText = '실패 (재시도)';
        btn.disabled = false;
      }
    }

    function connectSocket() {
      if (socket) socket.disconnect();
      socket = io('http://localhost:3001', {
        auth: { token: tokens.teacherToken }
      });

      socket.on('connect', () => {
        addLog('socket', '선생님 소켓 연결됨 (ID: ' + socket.id + ')');
        // 클래스 및 세션 룸 입장
        socket.emit('join_room', { room: `class:${tokens.classId}` });
        socket.emit('join_room', { room: `session:${tokens.sessionId}` });
        addLog('socket', `class:${tokens.classId}, session:${tokens.sessionId} 룸 입장 완료`);
      });

      socket.on('connect_error', (err) => addLog('socket_error', err.message));

      // 리스닝할 이벤트들
      const events = ['student_message', 'ai_message', 'student_analysis_ready', 'student_warning'];
      events.forEach(ev => socket.on(ev, data => addLog(ev, data)));
    }

    async function sendMessage() {
      if (!tokens) return alert('먼저 [데이터 세팅] 버튼을 눌러주세요.');
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text) return;

      input.value = '';
      input.disabled = true;
      document.getElementById('sendBtn').disabled = true;

      addChat(text, 'student');
      const aiBubble = addChat('...', 'ai');

      try {
        const response = await fetch('/livechat/message', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${tokens.studentToken}`
          },
          body: JSON.stringify({
            dialog_id: tokens.dialogId,
            content: text
          })
        });

        if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);

        const reader = response.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let aiText = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          const chunk = decoder.decode(value, { stream: true });
          const lines = chunk.split('\n');

          for (let line of lines) {
            if (line.startsWith('data: ')) {
              try {
                const data = JSON.parse(line.substring(6));
                aiText += data.chunk || '';
                aiBubble.innerText = aiText;
              } catch (e) { }
            }
          }
        }
      } catch (err) {
        aiBubble.innerText = '오류: ' + err.message;
      } finally {
        input.disabled = false;
        document.getElementById('sendBtn').disabled = false;
        input.focus();
      }
    }

    async function updateSession() {
      if (!tokens) return;
      const nameInput = document.getElementById('sessionNameInput');
      const expInput = document.getElementById('sessionExplanationInput');
      const btn = document.getElementById('updateSessionBtn');
      
      btn.disabled = true;
      btn.innerText = '저장 중...';
      
      try {
        const res = await fetch(`/sessions/${tokens.sessionId}`, {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${tokens.teacherToken}`
          },
          body: JSON.stringify({
            session_name: nameInput.value,
            explanation: expInput.value || undefined
          })
        });
        
        if (!res.ok) throw new Error(await res.text());
        addLog('system', `세션 정보 수정 완료!\n이름: ${nameInput.value}\n설명: ${expInput.value}`);
      } catch (err) {
        addLog('error', `세션 수정 실패: ${err.message}`);
      } finally {
        btn.disabled = false;
        btn.innerText = '저장';
      }
    }

    async function clearChat() {
      if (!tokens) return;
      if (!confirm('정말로 이 대화방의 모든 기록을 삭제하시겠습니까?')) return;
      
      try {
        const res = await fetch(`http://localhost:3001/livechat/dialog/${tokens.dialogId}`, {
          method: 'DELETE',
          headers: {
            'Authorization': `Bearer ${tokens.studentToken}`
          }
        });
        
        if (!res.ok) throw new Error(await res.text());
        addLog('system', '채팅 기록 및 분석 데이터가 삭제되었습니다.');
        document.getElementById('chatLog').innerHTML = '<div class="system-msg">기록이 삭제되었습니다. 새로운 대화를 시작하세요.</div>';
      } catch (err) {
        addLog('error', `삭제 실패: ${err.message}`);
      }
    }

    async function updateClass() {
      if (!tokens) return;
      const subjectInput = document.getElementById('classSubjectInput');
      const btn = document.getElementById('updateClassBtn');
      
      btn.disabled = true;
      btn.innerText = '저장 중...';
      
      try {
        const res = await fetch(`/classes/${tokens.classId}`, {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${tokens.teacherToken}`
          },
          body: JSON.stringify({
            subject: subjectInput.value
          })
        });
        
        if (!res.ok) throw new Error(await res.text());
        addLog('system', `클래스 정보 수정 완료!\n과목: ${subjectInput.value}`);
      } catch (err) {
        addLog('error', `클래스 수정 실패: ${err.message}`);
      } finally {
        btn.disabled = false;
        btn.innerText = '저장';
      }
    }
  </script>
</body>

</html>
